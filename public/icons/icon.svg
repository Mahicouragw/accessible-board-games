<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="pad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- game controller body -->
  <g transform="translate(256 268)">
    <path d="M-150 -40
             C-180 -40 -196 -10 -196 30
             C-196 78 -180 116 -150 116
             C-120 116 -110 86 -78 86
             L78 86
             C110 86 120 116 150 116
             C180 116 196 78 196 30
             C196 -10 180 -40 150 -40
             C120 -40 100 -18 60 -18
             L-60 -18
             C-100 -18 -120 -40 -150 -40 Z"
          fill="url(#pad)"/>
    <!-- d-pad -->
    <g fill="#0ea5e9">
      <rect x="-128" y="8" width="70" height="22" rx="6"/>
      <rect x="-104" y="-16" width="22" height="70" rx="6"/>
    </g>
    <!-- action buttons -->
    <circle cx="78" cy="6" r="16" fill="#f43f5e"/>
    <circle cx="118" cy="6" r="16" fill="#22c55e"/>
    <circle cx="98" cy="-24" r="16" fill="#eab308"/>
    <circle cx="98" cy="36" r="16" fill="#38bdf8"/>
  </g>
  <!-- dice -->
  <g transform="translate(340 150) rotate(15)">
    <rect x="-46" y="-46" width="92" height="92" rx="20" fill="#ffffff"/>
    <circle cx="-18" cy="-18" r="9" fill="#7c3aed"/>
    <circle cx="18" cy="18" r="9" fill="#7c3aed"/>
    <circle cx="0" cy="0" r="9" fill="#7c3aed"/>
  </g>
</svg>
