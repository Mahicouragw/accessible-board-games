name: Build APK

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "public/**"
      - "capacitor.config.ts"
      - "package.json"
      - ".github/workflows/apk.yml"
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Java (for Android)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate icons for PWA/APK
        run: npm run icons:generate || true

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Init Capacitor Android (if not exists)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap copy
          npx cap sync

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload APK as Release (optional)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          tag_name: apk-debug-${{ github.run_number }}
          name: "APK Debug Build ${{ github.run_number }}"
          body: |
            Accessible Board Games APK - Debug Build
            - Built from commit ${{ github.sha }}
            - Install on Android: allow unknown sources
            - Features: Ludo, Carrom, 2048, Memory, etc + Accessibility toolbar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
