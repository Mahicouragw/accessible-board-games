name: Build APK

permissions:
  contents: write

on:
  push:
    branches: ["main"]
    paths:
      - "flutter_apk/**"
      - ".github/workflows/apk.yml"
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform files
        run: |
          cd flutter_apk
          flutter create --platforms=android --project-name board_games --org com.mahicouragw .

      - name: Add internet permission & app label
        run: |
          python3 - <<'EOF'
          import re
          p = 'flutter_apk/android/app/src/main/AndroidManifest.xml'
          s = open(p).read()
          if 'android.permission.INTERNET' not in s:
              s = s.replace('<application',
                            '    <uses-permission android:name="android.permission.INTERNET"/>\n    <application', 1)
          s = re.sub(r'android:label="[^"]*"', 'android:label="Accessible Board Games"', s, count=1)
          if 'usesCleartextTraffic' not in s:
              s = re.sub(r'<application\b', '<application android:usesCleartextTraffic="true"', s, count=1)
          open(p, 'w').write(s)
          print('Manifest patched')
          EOF

      - name: Build debug APK
        run: |
          cd flutter_apk
          flutter pub get
          flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: accessible-board-games-apk
          path: flutter_apk/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 90

      - name: Upload APK as Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: flutter_apk/build/app/outputs/flutter-apk/app-debug.apk
          tag_name: flutter-apk-${{ github.run_number }}
          name: "Accessible Board Games APK (build ${{ github.run_number }})"
          body: |
            🎲 Accessible Board Games — Android APK built automatically from main.
            - Opens the live app at https://accessible-board-games.vercel.app — 19 games with realistic sounds & per-game music
            - Install on Android: allow "Install unknown apps" for your browser/file manager
            - Fully TalkBack-friendly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
