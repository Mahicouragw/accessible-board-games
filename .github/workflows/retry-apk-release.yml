name: Retry APK Release

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  rebuild-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate Android platform files
        run: |
          cd flutter_apk
          flutter create --platforms=android --project-name board_games --org com.mahicouragw .
      - name: Add internet permission & app label
        run: |
          python3 - <<'EOF'
          import re
          p = 'flutter_apk/android/app/src/main/AndroidManifest.xml'
          s = open(p).read()
          if 'android.permission.INTERNET' not in s:
              s = s.replace('<application',
                            '    <uses-permission android:name="android.permission.INTERNET"/>\n    <application', 1)
          s = re.sub(r'android:label="[^"]*"', 'android:label="Accessible Board Games"', s, count=1)
          if 'usesCleartextTraffic' not in s:
              s = re.sub(r'<application\b', '<application android:usesCleartextTraffic="true"', s, count=1)
          open(p, 'w').write(s)
          print('Manifest patched')
          EOF
      - name: Build debug APK
        run: |
          cd flutter_apk
          flutter pub get
          flutter build apk --debug

      # Outage-proof release: pure REST with retries (softprops/action-gh-release
      # fails when GitHub's REST API is degraded).
      - name: Publish release via REST with retries
        run: python3 .github/scripts/release_apk.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APK_PATH: flutter_apk/build/app/outputs/flutter-apk/app-debug.apk
          TAG_BASE: flutter-apk
          RELEASE_NAME: Accessible Board Games APK
